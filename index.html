<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일 목록</title>
    <!-- Tailwind CSS CDN 탑재로 세련되고 현대적인 UI 구현 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        'premium': '0 10px 30px -10px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.03)'
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome 아이콘 (추가 버튼이나 체크박스 디자인용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 시스템 폰트 및 부드러운 전환 효과 정의 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">

    <!-- 메인 컨테이너 (최대 너비 500px, 중앙 정렬 카드 스타일에 부합) -->
    <div class="w-full max-w-[500px] bg-white rounded-3xl p-8 shadow-premium border border-gray-100/80">
        
        <!-- 앱 타이틀 영역 (요청하신 공백 반영) -->
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2 tracking-tight">
                <span class="text-indigo-500"><i class="fa-solid fa-clipboard-list"></i></span>
                &nbsp; &nbsp; &nbsp; 나의 할 일 목록
            </h1>
            <p class="text-sm text-gray-400 mt-1 pl-1">오늘 할 일을 차근차근 계획하고 달성해보세요.</p>
        </header>

        <!-- 입력 영역 (입력창 + 추가 버튼) -->
        <div class="flex gap-2 mb-6">
            <div class="relative flex-1">
                <input 
                    id="todo-input"
                    type="text" 
                    placeholder="할 일을 입력하세요" 
                    class="w-full pl-4 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-gray-700 placeholder-gray-400 transition-all shadow-inner-soft"
                >
            </div>
            <button 
                id="add-btn"
                class="px-6 py-3.5 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold rounded-2xl transition-all duration-150 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/10"
            >
                <i class="fa-solid fa-plus text-sm"></i>
                <span>추가</span>
            </button>
        </div>

        <!-- 필터 및 제어 영역 (전체/진행중/완료 필터링 & 일괄 삭제 버튼) -->
        <div class="flex items-center justify-between gap-2 mb-6 bg-gray-50/80 p-1.5 rounded-2xl border border-gray-100">
            <div class="flex gap-1 flex-1">
                <button 
                    id="btn-filter-all" 
                    onclick="setFilter('all')"
                    class="flex-1 py-2 text-xs font-bold rounded-xl transition-all duration-200 bg-white text-indigo-600 shadow-sm border border-gray-100"
                >
                    전체
                </button>
                <button 
                    id="btn-filter-active" 
                    onclick="setFilter('active')"
                    class="flex-1 py-2 text-xs font-semibold rounded-xl transition-all duration-200 text-gray-500 hover:text-indigo-600 hover:bg-white/40"
                >
                    진행중
                </button>
                <button 
                    id="btn-filter-completed" 
                    onclick="setFilter('completed')"
                    class="flex-1 py-2 text-xs font-semibold rounded-xl transition-all duration-200 text-gray-500 hover:text-indigo-600 hover:bg-white/40"
                >
                    완료
                </button>
            </div>
            <!-- 완료된 항목 일괄 삭제 버튼 -->
            <button 
                id="clear-completed-btn"
                onclick="clearCompleted()"
                class="px-3 py-2 text-xs font-bold text-rose-500 hover:text-rose-600 hover:bg-rose-50/60 rounded-xl transition-all duration-150 flex items-center gap-1.5"
                title="완료된 할 일을 모두 삭제합니다"
            >
                <i class="fa-regular fa-trash-can"></i>
                <span>완료 삭제</span>
            </button>
        </div>

        <!-- 할 일 목록 영역 -->
        <main>
            <div class="flex justify-between items-center mb-4 px-1">
                <span class="text-sm font-semibold text-gray-500">목록</span>
                <!-- 전체 및 완료 할 일 개수를 보여주는 정교한 배지 -->
                <span id="todo-count" class="text-xs bg-indigo-50/70 text-indigo-600 px-3 py-1 rounded-full font-semibold border border-indigo-100/50">전체 0개, 완료 0개</span>
            </div>

            <!-- 할 일 아이템들이 동적으로 추가될 컨테이너 -->
            <ul id="todo-list" class="space-y-3 min-h-[150px] flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-2xl p-6 bg-gray-50/50 transition-all duration-300">
                <!-- 초기 빈 상태 안내 UI (스크립트 실행 시 동적으로 처리됨) -->
                <div class="text-center py-6">
                    <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-3 text-gray-400">
                        <i class="fa-regular fa-folder-open text-lg"></i>
                    </div>
                    <p class="text-sm text-gray-400 font-medium">등록된 할 일이 없습니다.</p>
                    <p class="text-xs text-gray-300 mt-1">새로운 할 일을 추가해보세요!</p>
                </div>
            </ul>
        </main>

        <!-- 푸터 디자인 요소 -->
        <footer class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">© 2026 나의 할 일 목록. All rights reserved.</p>
        </footer>

    </div>

    <!-- 커스텀 경고 알림창 (Toast Notification) -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2.5 opacity-0 pointer-events-none translate-y-2 transition-all duration-300 z-50">
        <i class="fa-solid fa-circle-exclamation text-amber-400"></i>
        <span id="toast-text" class="text-sm font-medium">할 일을 입력하세요</span>
    </div>

    <!-- JavaScript 영역 -->
    <script>
        // 할 일 데이터를 저장할 메모리(배열)
        let todos = [];
        // 현재 선택된 필터링 옵션 ('all', 'active', 'completed')
        let currentFilter = 'all';

        // DOM 요소 캐싱
        let todoInput;
        let addBtn;
        let todoList;
        let todoCount;
        let toast;
        let toastText;

        // 초기화 함수
        function initApp() {
            todoInput = document.getElementById('todo-input');
            addBtn = document.getElementById('add-btn');
            todoList = document.getElementById('todo-list');
            todoCount = document.getElementById('todo-count');
            toast = document.getElementById('toast');
            toastText = document.getElementById('toast-text');

            // 1. LocalStorage에서 저장된 데이터가 있는지 확인하고 불러옵니다.
            const savedTodos = localStorage.getItem('todos');
            if (savedTodos) {
                try {
                    todos = JSON.parse(savedTodos);
                } catch (e) {
                    console.error('LocalStorage 데이터 형식이 손상되어 데이터를 로드할 수 없습니다.', e);
                    todos = [];
                }
            }

            // 이벤트 리스너 등록
            addBtn.addEventListener('click', addTodo);
            todoInput.addEventListener('keydown', handleKeyPress);

            // 초기 화면 렌더링 (저장된 정보 로드 반영)
            render();
        }

        // LocalStorage에 현재 할 일 배열(todos) 상태를 직렬화하여 저장합니다.
        function saveToLocalStorage() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Enter 키 입력 감지 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                addTodo();
            }
        }

        // 커스텀 알림(Toast) 표시 기능
        function showToast(message) {
            toastText.textContent = message;
            
            // 토스트 노출 활성화 클래스 적용
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
            toast.classList.add('opacity-100', 'translate-y-0');

            // 2.5초 후 자동으로 닫기
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // 할 일 추가 함수 (중복 체크 추가)
        function addTodo() {
            const textValue = todoInput.value.trim();

            // 빈 값 입력 제한 처리
            if (textValue === '') {
                showToast('할 일을 입력하세요');
                todoInput.focus();
                return;
            }

            // 1. 중복 방지 기능 추가
            const isDuplicate = todos.some(todo => todo.text.toLowerCase() === textValue.toLowerCase());
            if (isDuplicate) {
                showToast('이미 등록된 할 일입니다');
                todoInput.focus();
                return;
            }

            // 새로운 할 일 객체 생성
            const newTodo = {
                id: Date.now(),
                text: textValue,
                completed: false
            };

            // 메모리 배열에 추가 및 입력창 초기화
            todos.push(newTodo);
            todoInput.value = '';
            
            // 로컬 스토리지 데이터 동기화 및 화면 업데이트
            saveToLocalStorage();
            render();
        }

        // 할 일 제거 함수
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            
            // 로컬 스토리지 데이터 동기화 및 화면 업데이트
            saveToLocalStorage();
            render();
        }

        // 완료/미완료 토글 함수
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            
            // 로컬 스토리지 데이터 동기화 및 화면 업데이트
            saveToLocalStorage();
            render();
        }

        // 2. 필터 변경 기능 추가
        function setFilter(filterType) {
            currentFilter = filterType;
            
            // 필터 버튼 활성화 클래스 조작
            const filters = ['all', 'active', 'completed'];
            filters.forEach(type => {
                const button = document.getElementById(`btn-filter-${type}`);
                if (type === filterType) {
                    // 활성화 스타일 적용
                    button.className = "flex-1 py-2 text-xs font-bold rounded-xl transition-all duration-200 bg-white text-indigo-600 shadow-sm border border-gray-100";
                } else {
                    // 비활성화 스타일 적용
                    button.className = "flex-1 py-2 text-xs font-semibold rounded-xl transition-all duration-200 text-gray-500 hover:text-indigo-600 hover:bg-white/40";
                }
            });

            render();
        }

        // 3. 완료 항목 일괄 삭제 기능 추가
        function clearCompleted() {
            const completedCount = todos.filter(todo => todo.completed).length;
            
            if (completedCount === 0) {
                showToast('삭제할 완료된 할 일이 없습니다');
                return;
            }

            todos = todos.filter(todo => !todo.completed);
            
            // 로컬 스토리지 데이터 동기화 및 화면 업데이트
            saveToLocalStorage();
            render();
            showToast('완료된 항목이 일괄 삭제되었습니다');
        }

        // HTML 이스케이프 함수 (보안 위협 방지)
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 화면 렌더링 함수
        function render() {
            // 할 일 통계 구하기 (실시간 통계는 전역 상태 기준)
            const totalCount = todos.length;
            const completedCount = todos.filter(todo => todo.completed).length;

            // 목록 개수 표시 업데이트 (전체 N개, 완료 N개 양식 적용)
            todoCount.textContent = `전체 ${totalCount}개, 완료 ${completedCount}개`;

            // 현재 선택된 필터에 따라 렌더링할 할 일 데이터 가공
            let filteredTodos = todos;
            if (currentFilter === 'active') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }

            // 필터링 적용 결과 목록이 비었을 때의 처리
            if (filteredTodos.length === 0) {
                todoList.className = "space-y-3 min-h-[150px] flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-2xl p-6 bg-gray-50/50 transition-all duration-300";
                
                let emptyMessage = "등록된 할 일이 없습니다.";
                let emptySubMessage = "새로운 할 일을 추가해보세요!";
                let emptyIcon = "fa-regular fa-folder-open";

                if (currentFilter === 'active') {
                    emptyMessage = "진행 중인 할 일이 없습니다.";
                    emptySubMessage = "오늘의 목표를 다 끝마쳤거나 새로 작성해 보세요!";
                    emptyIcon = "fa-solid fa-circle-check text-emerald-400";
                } else if (currentFilter === 'completed') {
                    emptyMessage = "완료된 할 일이 없습니다.";
                    emptySubMessage = "할 일을 완료하여 체크박스를 채워보세요!";
                    emptyIcon = "fa-regular fa-circle-check";
                }

                todoList.innerHTML = `
                    <div class="text-center py-6">
                        <div class="w-12 h-12 rounded-full bg-gray-100/80 flex items-center justify-center mx-auto mb-3 text-gray-400">
                            <i class="${emptyIcon} text-lg"></i>
                        </div>
                        <p class="text-sm text-gray-400 font-medium">${emptyMessage}</p>
                        <p class="text-xs text-gray-300 mt-1">${emptySubMessage}</p>
                    </div>
                `;
                return;
            }

            // 목록 데이터가 존재할 때의 스타일 및 리스트 렌더링
            todoList.className = "space-y-3 min-h-[150px] flex flex-col justify-start border-0 rounded-2xl p-0 bg-transparent transition-all duration-300";
            todoList.innerHTML = '';

            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                
                // 완료 상태 분기 스타일 적용
                const itemClass = todo.completed 
                    ? "flex items-center justify-between p-4 bg-gray-50/60 border border-gray-100 rounded-2xl transition-all duration-200"
                    : "flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm transition-all duration-200 hover:shadow-md hover:border-indigo-100";
                
                li.className = itemClass;

                const textClass = todo.completed 
                    ? "line-through text-gray-400 font-medium text-sm flex-1 truncate select-none pl-1"
                    : "text-gray-700 font-medium text-sm flex-1 truncate select-none pl-1";

                const iconClass = todo.completed
                    ? "fa-solid fa-circle-check text-emerald-500 text-xl transition-all"
                    : "fa-regular fa-circle text-gray-300 hover:text-indigo-500 text-xl transition-all";

                li.innerHTML = `
                    <div class="flex items-center gap-3.5 flex-1 min-w-0 cursor-pointer" onclick="toggleTodo(${todo.id})">
                        <span class="flex items-center justify-center flex-shrink-0">
                            <i class="${iconClass}"></i>
                        </span>
                        <span class="${textClass}">
                            ${escapeHtml(todo.text)}
                        </span>
                    </div>
                    <button 
                        onclick="deleteTodo(${todo.id})" 
                        class="text-gray-400 hover:text-rose-500 hover:bg-rose-50 p-2.5 rounded-xl transition-all duration-150 flex-shrink-0" 
                        title="삭제"
                    >
                        <i class="fa-regular fa-trash-can text-base"></i>
                    </button>
                `;

                todoList.appendChild(li);
            });
        }

        // 페이지 로드 시 initApp 실행
        window.addEventListener('DOMContentLoaded', () => {
            initApp();
        });
    </script>
</body>
</html>
